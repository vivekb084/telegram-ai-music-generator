version: "3.9"

services:
  musicgen:
    build: ./api
    container_name: telegram-ai-music-generator

    ports:
      - "8000:8000"

    env_file:
      - .env

    volumes:
      - hf_cache:/root/.cache/huggingface
      - ./outputs:/app/outputs

    restart: unless-stopped

volumes:
  hf_cache: